  <text x="620" y="115" font-size="14" fill="#a9f7d4" font-family="Segoe UI, Roboto, sans-serif">Strategy</text>
  <!-- sigma badge -->
  <g transform="translate(640,40)">
    <rect width="130" height="44" rx="22" fill="rgba(17,214,139,0.14)" stroke="rgba(17,214,139,0.5)"/>
    <text x="18" y="28" font-size="18" font-weight="700" fill="#7bf0bb" font-family="Segoe UI, Roboto, sans-serif">σ target 10%</text>
  </g>
  <g font-family="Segoe UI, Roboto, sans-serif">
    <text x="40" y="400" font-size="30" font-weight="700" fill="#eafff5">Vol-Targeted Momentum</text>
    <text x="40" y="428" font-size="16" fill="#8bd7ba">12-1 momentum · EWMA vol · cross-asset</text>
  </g>
