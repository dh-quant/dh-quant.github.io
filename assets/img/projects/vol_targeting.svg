<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="Vol-Targeted Momentum thumbnail">
  <defs>
    <linearGradient id="bgVT" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1f1a"/>
      <stop offset="1" stop-color="#10332a"/>
    </linearGradient>
    <linearGradient id="stratVT" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#11d68b"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="stratArea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#11d68b" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#11d68b" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bgVT)"/>
  <!-- grid -->
  <g stroke="#1f4a3c" stroke-width="1" opacity="0.55">
    <path d="M0 112 H800 M0 224 H800 M0 336 H800"/>
  </g>
  <!-- benchmark (dashed) -->
  <path d="M30 340 C 180 320, 260 295, 340 300 S 520 260, 640 220 760 200 790 185"
        fill="none" stroke="#9a7b0a" stroke-dasharray="6 6" stroke-width="2.5" opacity="0.9"/>
  <text x="640" y="205" font-size="14" fill="#e3c75d" font-family="Segoe UI, Roboto, sans-serif">Benchmark</text>
  <!-- strategy area -->
  <path d="M30 340 C 180 300, 260 270, 340 240 S 520 170, 640 130 760 95 790 85 L790 380 L30 380 Z"
        fill="url(#stratArea)"/>
  <path d="M30 340 C 180 300, 260 270, 340 240 S 520 170, 640 130 760 95 790 85"
