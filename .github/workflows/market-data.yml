name: Update market ticker

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes (UTC)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: market-data
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch market quotes
        run: python scripts/fetch_market.py

      - name: Commit & push if changed
        run: |
          set -e
          git config user.name "dh-quant-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git diff --quiet assets/data/ticker.json; then
            echo "No ticker changes."
            exit 0
          fi

          git add assets/data/ticker.json
          git commit -m "chore(data): refresh ticker $(date -u +'%Y-%m-%dT%H:%MZ')"
          git push origin HEAD:main
